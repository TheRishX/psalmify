<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8b5cf6" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- squircle base -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#grad)" filter="url(#glow)" />
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4" />

  <!-- lyrics & music note composite emblem -->
  <g transform="translate(108, 108)" fill="#ffffff">
    <!-- minimalist lyrics lines representing structured stanzas -->
    <rect x="40" y="80" width="130" height="16" rx="8" fill-opacity="0.8" />
    <rect x="40" y="120" width="180" height="16" rx="8" fill-opacity="0.8" />
    <rect x="40" y="160" width="150" height="16" rx="8" fill-opacity="0.8" />
    <rect x="40" y="200" width="110" height="16" rx="8" fill-opacity="0.5" />
    
    <!-- elegant double eighth music note -->
    <path d="M 175 45 
             L 245 25 
             A 6 6 0 0 1 253 31 
             L 253 135 
             A 24 20 0 1 1 213 155 
             A 24 20 0 0 1 253 135
             L 253 80 
             L 185 97 
             L 185 155 
             A 24 20 0 1 1 145 175 
             A 24 20 0 0 1 185 155
             L 185 45 
             Z" 
          fill="#ffffff" 
          stroke="#ffffff"
          stroke-width="3" />
  </g>
</svg>
