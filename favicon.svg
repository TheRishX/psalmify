<svg xmlns="http://www.w3.org/2500/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Sleek rounded card base -->
  <rect width="512" height="512" rx="140" fill="url(#bg-grad)" />
  
  <!-- Outer fine detailed ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="16" stroke-opacity="0.2" />

  <!-- Lyric Sheet horizontal bars under note -->
  <rect x="130" y="140" width="120" height="20" rx="10" fill="#ffffff" fill-opacity="0.3" />
  <rect x="130" y="190" width="80" height="20" rx="10" fill="#ffffff" fill-opacity="0.3" />
  <rect x="130" y="240" width="100" height="20" rx="10" fill="#ffffff" fill-opacity="0.3" />
  
  <!-- Double music note structure -->
  <g fill="#ffffff" transform="translate(40, -10)">
    <!-- Node A stem -->
    <rect x="180" y="120" width="22" height="220" rx="4" />
    <!-- Node B stem -->
    <rect x="310" y="90" width="22" height="220" rx="4" />
    <!-- Head beam -->
    <path d="M180 120 L332 90 L332 145 L180 175 Z" />
    <!-- Ball A -->
    <ellipse cx="155" cy="335" rx="36" ry="26" transform="rotate(-15, 155, 335)" />
    <!-- Ball B -->
    <ellipse cx="285" cy="305" rx="36" ry="26" transform="rotate(-15, 285, 305)" />
  </g>

  <!-- AI glow energy sparkles -->
  <path d="M410 180 c0 15 10 20 15 20 c-5 0 -15 5 -15 20 c0 -15 -10 -20 -15 -20 c5 0 15 -5 15 -20" fill="#fef08a" />
</svg>
